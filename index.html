<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hail Mary</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }
        
        /* Container to hold all the generated stars */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Keeps the stars in the background */
        }

        /* The base styling for a single star */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            /* The animation will be customized per star in JS */
            animation: twinkle infinite ease-in-out;
        }

        /* The keyframes that make the stars glow and dim */
        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.1; 
                transform: scale(0.8); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.2); 
                box-shadow: 0 0 6px rgba(255, 255, 255, 0.8); 
            }
        }
        
        /* The text container */
        .container {
            position: relative;
            z-index: 1; /* Brings the text in front of the stars */
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 1.25rem;
            padding: 20px;
            /* A subtle shadow behind the text ensures it remains readable if a star shines directly behind it */
            text-shadow: 0 0 10px black, 0 0 20px black; 
        }

        .dialogue-gap {
            margin-top: 40px; 
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="container">
        <div>"How long have you been together"</div>
        <div id="years"></div>
        <div id="days"></div>
        <div id="minutes"></div>
        
        <div class="dialogue-gap">"That's a long time"</div>
        <div>"It's not enough"</div>
    </div>

    <script>
        // --- STAR GENERATOR LOGIC ---
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150; // Adjust this number for more or fewer stars

            for (let i = 0; i < starCount; i++) {
                let star = document.createElement('div');
                star.classList.add('star');
                
                // Randomize position across the screen
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                
                // Randomize size (between 1px and 3px)
                let size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                // Randomize animation duration (how fast it blinks) and delay (so they don't blink in unison)
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                
                container.appendChild(star);
            }
        }

        // --- TIME CALCULATION LOGIC ---
        function updateTime() {
            // Start date: August 25, 2022, 7:20 PM Peru Time (UTC-5)
            const startDate = new Date('2022-08-25T19:20:00-05:00');
            const now = new Date();
            
            const diffMs = now - startDate;

            const msInMinute = 1000 * 60;
            const msInDay = msInMinute * 60 * 24;
            const msInYear = msInDay * 365.25; 

            const totalYears = (diffMs / msInYear).toFixed(1); 
            const totalDays = Math.floor(diffMs / msInDay);
            const totalMinutes = Math.floor(diffMs / msInMinute);

            const formatNumber = (num) => Number(num).toLocaleString('en-US');

            document.getElementById('years').innerText = `"${totalYears} years"`;
            document.getElementById('days').innerText = `"${formatNumber(totalDays)} days"`;
            document.getElementById('minutes').innerText = `"${formatNumber(totalMinutes)} minutes"`;
        }

        // Run both scripts when the page loads
        createStars();
        updateTime();
        
        // Refresh the math every 60 seconds
        setInterval(updateTime, 60000);
    </script>

</body>
</html>
